<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mirals-decoration</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="hero" id="heroSection">
    <div class="hero-overlay"></div>
    <div class="hero-content"></div>
  </header>

  <section class="social-links" id="socialLinks" hidden aria-label="روابط السوشيال ميديا"></section>

  <div class="category-bar">
    <nav class="category-scroller" id="categoryContainer">
      <!-- Categories will be injected here via JS -->
    </nav>
  </div>

  <main class="products-container" id="productsContainer">
    <!-- Products will be injected here via JS -->
    <div class="loader">جاري التحميل...</div>
  </main>

  <div class="sticky-bottom-bar" id="stickyBottomBar" hidden></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
